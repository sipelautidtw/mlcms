# === 5. TONE OF VOICE ===
tone:
  personality:
    - "Otoritatif"
    - "Berpengalaman"
    - "Edukatif"
    - "Pragmatis"
    - "Profesional formal namun approachable"

  spectrum:
    formality_0to100: 30        # 0=formal corporate, 100=casual
    technicality_0to100: 25     # 0=technical, 100=layman
    seriousness_0to100: 25      # 0=serious, 100=humorous
    voice_style_0to100: 40      # 0=corporate "kami", 100=personal "saya"
    sales_approach_0to100: 80   # 0=hard-sell, 100=educational
    language_mix_0to100: 50     # 0=full Indonesia, 100=full English

  do_examples:
    en:
      - "Navigating the complexities of shipbuilding and maritime solutions requires a partner you can trust."
      - "We bring nearly twelve years of dedicated experience and a proven track record to every project."
      - "Our approach bridges the gap between theory and real-world usability."
      - "Importantly, a well-defined ship design workflow helps minimize risks."

    id:
      - "Menavigasi kompleksitas konstruksi kapal membutuhkan mitra yang dapat dipercaya."
      - "Hampir 12 tahun pengalaman kami adalah jaminan bahwa setiap proyek tidak dimulai dari nol."
      - "Spesifikasi yang bagus di kertas, harus terbukti efisien di laut."
      - "Supervisi yang baik adalah investasi — bukan biaya tambahan."

    founder_voice:
      - "Setelah hampir 12 tahun di industri ini, satu prinsip yang tidak pernah berubah: [...]"
      - "Dari pengalaman supervisi proyek [tipe], saya belajar bahwa [...]"
      - "Pertanyaan yang sering saya terima dari klien tug & barge: [...]"

  dont_examples:
    - "Slang berlebihan (auto, kuy, bestie, no debat)"
    - "Klaim superlatif tanpa data (terbaik di Indonesia, nomor 1) — kecuali ada referensi konkret"
    - "Hard-sell agresif (BURUAN, emoji api, PROMO TERAKHIR)"
    - "Janji vague (solusi terbaik, kualitas terjamin) tanpa parameter konkret"
    - "Mengutip pendapat Pak Ahlan tanpa label jelas"

